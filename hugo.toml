baseURL = 'https://mhd64.dev/'
locale = 'en-us'
languageCode = 'en-us'
title = 'mhd64'
theme = 'devlix'
uglyURLs = true
enableRobotsTXT = true

[outputs]
  home = ['html', 'rss']
  section = ['html', 'rss']

[params]
  description = 'Mohamed Elsayed (mhd64), systems developer. Notes and projects on software, systems, and tinkering.'
  footerText = '<a href="https://github.com/mhd64real/mhd64real">Source code</a> &middot; <a href="https://github.com/mhd64real/mhd64real/blob/main/LICENSE">MIT Licensed</a>'
  photoRatio = '1 / 1'
  author = 'Mohamed Elsayed'
  defaultImage = '/img/cd.png'

  [params.profile]
    name = 'Mohamed Elsayed'
    photo = '/img/cd.png'
    roles = ['Tech hobbyist', 'Based in Sharjah, UAE']

    [[params.profile.links]]
      text = 'me@mhd64.dev'
      url = 'mailto:me@mhd64.dev'
    [[params.profile.links]]
      text = 'github/mhd64real'
      url = 'https://github.com/mhd64real'
    [[params.profile.links]]
      text = 'linkedin/mhd64'
      url = 'https://www.linkedin.com/in/mhd64'

  [params.giscus]
    repo = 'mhd64real/mhd64real'
    repoId = 'R_kgDOS_R_Ag'
    category = 'General'
    categoryId = 'DIC_kwDOS_R_As4C_hbl'
    mapping = 'pathname'
    discussionUrl = 'https://github.com/mhd64real/mhd64real/discussions/1'

[menu]
  [[menu.main]]
    name = 'Home'
    url = '/index.html'
    weight = 10
  [[menu.main]]
    name = 'Blog'
    url = '/blog/'
    weight = 20
  [[menu.main]]
    name = 'Guestbook'
    url = '/guestbook.html'
    weight = 30

[markup]
  [markup.highlight]
    style = 'monokai'
    noClasses = true
    lineNos = false
    tabWidth = 2
    guessSyntax = true
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
