name: Update profile README

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'   # daily refresh

permissions:
  contents: write

concurrency:
  group: profile-readme
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  readme:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.163.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Hugo CLI
        run: |
          wget -O /tmp/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i /tmp/hugo.deb

      - name: Build site (for the blog RSS feed)
        run: hugo --minify --baseURL "https://mhd64.dev/"

      - name: Generate README
        run: python3 .github/scripts/gen-readme.py

      - name: Commit if changed
        run: |
          if git diff --quiet README.md; then
            echo "README unchanged."
          else
            git config user.name "Mohamed Elsayed"
            git config user.email "mhd64.real@gmail.com"
            git add README.md
            git commit -m "Update profile README"
            git push
          fi
